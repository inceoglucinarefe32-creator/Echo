<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Pack Explorer</title>
    <style>
        :root { --main-orange: #FA9048; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: var(--main-orange); text-shadow: 0 0 10px rgba(250, 144, 72, 0.5); }
        
        /* Filtreleme Alanı */
        .filter-bar { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        select, input { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #252525; 
            color: white; 
            outline: none;
        }
        .search-btn {
            background: var(--main-orange);
            color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .search-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Kart Yapısı */
        .pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .pack-card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            overflow: hidden; 
            transition: 0.3s; 
            border: 1px solid #333;
        }
        .pack-card:hover { border-color: var(--main-orange); transform: translateY(-5px); }
        .pack-info { padding: 15px; }
        .tag { font-size: 0.8em; background: #333; padding: 3px 8px; border-radius: 4px; margin-right: 5px; }
        .visit-btn { 
            display: block; text-align: center; background: #2ecc71; color: white; 
            text-decoration: none; padding: 10px; margin-top: 10px; border-radius: 5px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ECHO PACK EXPLORER</h1>

    <div class="filter-bar">
        <select id="category">
            <option value="pvp">PvP Packler</option>
            <option value="faithful">Faithful / Default</option>
            <option value="fps-boost">FPS Boost</option>
        </select>

        <select id="resolution">
            <option value="16x">16x16</option>
            <option value="32x">32x32</option>
            <option value="64x">64x64</option>
            <option value="128x">128x+</option>
        </select>

        <select id="version">
            <option value="1.8.9">1.8.9 (PvP Standard)</option>
            <option value="1.20">1.20+</option>
            <option value="1.16.5">1.16.5</option>
        </select>

        <button class="search-btn" onclick="searchPacks()">Web'de Ara</button>
    </div>

    <div class="pack-grid" id="results">
        <div class="pack-card">
            <div class="pack-info">
                <h3>Önerilen: PvP Pack</h3>
                <span class="tag">16x</span> <span class="tag">1.8.9</span>
                <p>En popüler PvP paketlerini gör.</p>
                <a href="https://www.planetminecraft.com/texture-packs/?op2=32" target="_blank" class="visit-btn">Göz At</a>
            </div>
        </div>
    </div>
</div>

<script>
    function searchPacks() {
        const cat = document.getElementById('category').value;
        const res = document.getElementById('resolution').value;
        const ver = document.getElementById('version').value;
        
        // Google üzerinde otomatik arama linki oluşturur
        const query = `minecraft ${cat} texture pack ${res} ${ver} download`;
        const searchURL = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        
        window.open(searchURL, '_blank');
    }
</script>

</body>
</html>
