<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Echo | AI Web & Video Studio 2036</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --o: #FA9048; --t: #40E0D0; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Navbar */
        nav { height: 70px; background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 2px solid var(--o); }
        .logo { font-family: 'Orbitron'; font-size: 26px; color: var(--o); text-shadow: 0 0 15px var(--o); }
        
        .auth-box { display: flex; gap: 10px; }
        .btn-l { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .g-btn { background: #fff; color: #000; }
        .h-btn { background: #00a4ef; color: #fff; }

        /* Ana Panel Layout */
        .main-grid { display: grid; grid-template-columns: 250px 1fr 350px; height: calc(100vh - 72px); gap: 10px; padding: 10px; }
        .pnl { background: #0d0d0d; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        
        /* AI Terminal */
        #term { background: #000; color: #0f0; font-family: 'JetBrains Mono'; height: 200px; overflow-y: auto; padding: 10px; font-size: 11px; border: 1px solid var(--t); }
        
        /* Video Editor Area */
        #v-screen { width: 100%; height: 350px; background: #000 url('https://via.placeholder.com/800?text=VIDEO+UPLOADING...') center/cover; position: relative; cursor: crosshair; border: 1px solid #333; }
        .sel-rect { position: absolute; border: 2px solid red; background: rgba(255,0,0,0.2); pointer-events: none; }

        .go-btn { width: 100%; padding: 15px; background: var(--o); border: none; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .go-btn:hover { box-shadow: 0 0 20px var(--o); transform: scale(1.02); }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; border-radius: 4px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ECHO.CORE</div>
    <div class="auth-box">
        <button class="btn-l g-btn">Google Login</button>
        <button class="btn-l h-btn">Hotmail Login</button>
    </div>
</nav>

<div class="main-grid">
    <div class="pnl">
        <h3 style="color:var(--t)">STUDIO TOOLS</h3>
        <ul style="list-style:none; padding:0; font-size:13px; color:#aaa;">
            <li style="margin-bottom:10px;">• Watermark Removal (AI)</li>
            <li style="margin-bottom:10px;">• 4K Upscaling</li>
            <li style="margin-bottom:10px;">• HTML Web Gen</li>
        </ul>
        <div style="margin-top:150px; font-size:10px; color:var(--o)">ADMIN MODE: UNLIMITED</div>
    </div>

    <div class="pnl">
        <div id="v-screen" onmousedown="sDrg(event)" onmousemove="mDrg(event)" onmouseup="eDrg()">
            <div id="rect" class="sel-rect" style="display:none;"></div>
        </div>
        <textarea id="ai-p" style="width:100%; height:80px; margin-top:10px; background:#111; color:#fff; border:1px solid #444; padding:10px;" placeholder="AI'ya ne yapacağını söyle..."></textarea>
        <button class="go-btn" onclick="triggerAI()">AI PROTOKOLÜNÜ ÇALIŞTIR</button>
    </div>

    <div class="pnl" style="display:flex; flex-direction:column;">
        <div id="term">> Echo AI Kernel Ready...</div>
        <div style="flex:1; margin-top:10px;">
            <iframe id="res-view"></iframe>
        </div>
    </div>
</div>

<script>
    let drg=false, x, y;
    const r = document.getElementById('rect');
    const t = document.getElementById('term');
    const v = document.getElementById('res-view');

    function sDrg(e){ drg=true; x=e.offsetX; y=e.offsetY; r.style.display='block'; r.style.left=x+'px'; r.style.top=y+'px'; r.style.width='0'; r.style.height='0'; }
    function mDrg(e){ if(!drg)return; r.style.width=(e.offsetX-x)+'px'; r.style.height=(e.offsetY-y)+'px'; }
    function eDrg(){ drg=false; t.innerHTML += "<br>> Region Lock: Done"; }

    function triggerAI() {
        const pr = document.getElementById('ai-p').value;
        t.innerHTML += "<br>> Processing: " + pr + "...";
        setTimeout(() => {
            t.innerHTML += "<br>> Generating Code...";
            v.srcdoc = "<html><body style='background:#111;color:#FA9048;display:flex;justify-content:center;align-items:center;height:100vh;'><h1>"+pr+"</h1></body></html>";
            alert("İşlem Başarılı: AI her şeyi halletti!");
        }, 2000);
    }
</script>
</body>
</html>
